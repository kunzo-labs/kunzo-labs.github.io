<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1a0b0b 0%, #3d0a0a 100%); }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .heart {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white antialiased px-6">

    <div class="max-w-md w-full glass p-10 rounded-[2rem] text-center space-y-8 shadow-2xl">
        
        <div class="heart text-6xl text-rose-500">
            ❤️
        </div>

        <div class="space-y-4">
            <h1 class="text-3xl font-serif italic text-rose-200">
                To my wonderful wife Heba,
            </h1>
            <div class="h-px w-16 bg-rose-500/50 mx-auto"></div>
            <p class="text-lg leading-relaxed text-slate-300 font-light">
                Every line of code I write and every system I build is for our future. Thank you for being the heart of my world.
            </p>
        </div>

        <div class="pt-4">
            <p class="text-sm uppercase tracking-[0.2em] text-rose-400 font-semibold">
                I Love You
            </p>
            <p class="mt-2 text-xs text-slate-500 italic">
                Always & Forever
            </p>
        </div>

    </div>

    <div class="absolute top-10 left-10 w-32 h-32 bg-rose-900/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-10 right-10 w-32 h-32 bg-rose-900/20 rounded-full blur-3xl"></div>

</body>
</html>
