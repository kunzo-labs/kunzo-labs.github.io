<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunzo Labs | Innovation & Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; }
        .radial-bg {
            background: radial-gradient(circle at 50% -20%, #1e293b 0%, #050505 80%);
        }
    </style>
</head>
<body class="radial-bg flex items-center justify-center min-h-screen text-slate-300 antialiased px-6">

    <div class="max-w-xl w-full text-center space-y-12">
        
        <div class="flex justify-center">
            <div class="w-16 h-16 border-2 border-blue-500 rounded-xl flex items-center justify-center rotate-45 group hover:rotate-90 transition-transform duration-500">
                <span class="text-white font-bold text-2xl -rotate-45 group-hover:-rotate-90 transition-transform duration-500">K</span>
            </div>
        </div>

        <div class="space-y-4">
            <h1 class="text-4xl font-semibold tracking-tight text-white sm:text-5xl">
                KUNZO LABS
            </h1>
            <div class="h-px w-24 bg-gradient-to-r from-transparent via-slate-700 to-transparent mx-auto"></div>
            <p class="text-lg font-light text-slate-400 max-w-sm mx-auto leading-relaxed">
                Architecting high-scale systems and next-generation digital infrastructure.
            </p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-6 pt-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-xs uppercase tracking-widest text-slate-500 font-medium">Phase I Development</span>
            </div>
        </div>

        <footer class="pt-12 border-t border-slate-900">
            <a href="mailto:support@kunzo.app" 
               class="text-sm text-slate-500 hover:text-blue-400 transition-colors duration-300">
                support@kunzo.app
            </a>
            <p class="mt-4 text-[10px] text-slate-700 uppercase tracking-[0.4em]">
                &copy; 2026 KUNZO LABS.
            </p>
        </footer>

    </div>

</body>
</html>
